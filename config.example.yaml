app:
  name: ChromaDB Flask UI
  debug: false

server:
  host: "127.0.0.1"
  port: 5012

chromadb:
  path: "${CHROMADB_PATH}"
  tenant: default_tenant
  database: default_database

ui:
  items_per_page: 50
  dark_mode: false
  show_scores: true

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
